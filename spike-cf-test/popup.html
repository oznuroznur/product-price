<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <style>
    body { font: 13px/1.45 system-ui, sans-serif; width: 560px; margin: 0; padding: 12px; color: #1a1a1a; }
    h1 { font-size: 15px; margin: 0 0 8px; }
    button { font: inherit; padding: 6px 14px; cursor: pointer; }
    #status { margin: 8px 0; color: #555; }
    table { border-collapse: collapse; width: 100%; margin-top: 8px; }
    th, td { border: 1px solid #ddd; padding: 4px 6px; text-align: left; vertical-align: top; }
    th { background: #f5f5f5; }
    td.gecti { background: #e6f4ea; font-weight: 600; }
    td.challenge { background: #fce8e6; font-weight: 600; }
    td.diger { background: #fef7e0; }
    pre { background: #f5f5f5; padding: 8px; overflow: auto; max-height: 220px; font-size: 11px; }
    .actions { display: flex; gap: 8px; align-items: center; }
  </style>
</head>
<body>
  <h1>Epey / Cimri erişim testi (service worker fetch)</h1>
  <div class="actions">
    <button id="run">Testleri çalıştır</button>
    <button id="copy" hidden>Ham JSON'u kopyala</button>
  </div>
  <div id="status">Hazır. Testler ~10 sn sürer (istekler arası bekleme var).</div>
  <div id="out"></div>
  <script src="popup.js"></script>
</body>
</html>
